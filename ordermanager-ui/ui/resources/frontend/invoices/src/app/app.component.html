@if (!isAuthenticated()) {
  <div class="app-header p-shadow-4">
    <a
      (click)="router.navigateByUrl('/')"
      [pTooltip]="'tooltips.navigate_home' | transloco"
      tooltipPosition="right"
      class="home-link">
      <img src="assets/home-small.png" alt="Home">
    </a>

    <h3 class="app-title">{{ 'title' | transloco }}</h3>
  </div>

  <app-user-login></app-user-login>
} @else {
  <div class="app-shell">
    <div class="app-header p-shadow-4">
      <p-menubar [model]="menuItems">
        <ng-template pTemplate="start">
          <a
            (click)="router.navigateByUrl('/')"
            [pTooltip]="'tooltips.navigate_home' | transloco"
            tooltipPosition="right"
            class="home-link">
            <img src="assets/home-small.png" alt="Home">
          </a>
          <span class="app-title">{{ 'title' | transloco }}</span>
        </ng-template>

        <ng-template pTemplate="end">
<!--          <button-->
<!--            pButton-->
<!--            type="button"-->
<!--            class="p-button-text"-->
<!--            label="DE"-->
<!--            (click)="switchLang('de')">-->
<!--          </button>-->

<!--          <button-->
<!--            pButton-->
<!--            type="button"-->
<!--            class="p-button-text"-->
<!--            label="EN"-->
<!--            (click)="switchLang('en')">-->
<!--          </button>-->
        </ng-template>
      </p-menubar>
    </div>

    @if (router.url === '/') {
      <div class="page-content">
        <h2>{{ 'homepage.heading' | transloco }}</h2>
      </div>
    }

    <router-outlet></router-outlet>
  </div>
}
